<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid - Example</title>
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

    
    <header>
        <nav>
            <div class="item">
                <p>Home</p>
            </div>
            <div class="item">
                <p>About</p>
            </div>
            <div class="item">
                <p>Products</p>
            </div>
            <div class="item">
                <p>Services</p>
            </div>
            <div class="item">
                <p>Contact</p>
            </div>
        </nav>
    </header>
    <main class="container">
        <div class="item item1 myItem" id="firstItem">
            <p>Item 1</p>
        </div>
        <div class="item item2">
            <p>Item 2</p>
        </div>
        <div class="item item3">
            <p>Item 3</p>
        </div>
        <div class="item item4">
            <p>Item 4</p>
        </div>
        <div class="item item5">
            <p>Item 5</p>
        </div>
    </main>

    <section class="animated-container">
        <div class="item">
            <div class="background">
            </div>
            <div class="text">
                <p>Animation</p>
            </div>
        </div>
        <div class="item">
            <div class="background">
            </div>
            <div class="text">
                <p>Web Design</p>
            </div>
        </div>
        <div class="item">
            <div class="background">
            </div>
            <div class="text">
                <p>Game Development</p>
            </div>
        </div>
    </section>

    <section id="myAnimation">
        <div class="box"></div>
    </section>

</body>

</html>
